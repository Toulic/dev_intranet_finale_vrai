{% extends 'commun/base.html' %}
{% block content %}
    <div class="card">
        <div class="card-header">Saisie des notes - Classe : GCS2-A</div>
        <form method="POST" style="display: flex; gap: 10px; align-items: flex-end; margin-bottom: 30px; flex-wrap: wrap;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div>
                <label>Élève</label><br>
                <select name="etudiant_id" style="padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
                    {% for eleve in eleves %}
                        <option value="{{ eleve.id }}">{{ eleve.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label>Matière</label><br>
                <input type="text" name="matiere" placeholder="Ex: Cyber" required style="padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
            </div>
            <div>
                <label>Note / 20</label><br>
                <input type="number" step="0.5" name="note" min="0" max="20" required style="padding: 10px; width: 70px; border-radius: 4px; border: 1px solid #ccc;">
            </div>
            <button type="submit" style="padding: 11px 25px; background: var(--pronote-green); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Enregistrer la note</button>
        </form>

        <div class="card-header" style="border-color: #333; color: #333;">Liste des élèves de ma classe</div>
        <table>
            <thead>
                <tr>
                    <th>Nom de l'élève</th>
                    <th>Classe</th>
                    <th>Dossier Scolaire</th>
                </tr>
            </thead>
            <tbody>
                {% for eleve in eleves %}
                <tr>
                    <td><strong>{{ eleve.username }}</strong></td>
                    <td>GCS2-A</td>
                    <td>
                        <a href="{{ url_for('view_student_folder', eleve_id=eleve.id) }}" 
                           style="background: #f0f0f0; padding: 5px 12px; border-radius: 4px; text-decoration: none; color: var(--pronote-green); border: 1px solid var(--pronote-green); font-size: 0.9rem;">
                           Voir dossier
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
