name: CI/CD Pronote Security

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi # 

      # 01. Flake8 - Qualité du code
      - name: Run Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # 02. Bandit - Analyse statique (SAST)
      - name: Security Scan (Bandit)
        run: |
          bandit -r . -x ./venv

      # 03. pip-audit - Scan des vulnérabilités dépendances
      - name: Dependency Scan (pip-audit)
        run: |
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; fi

      # 05. Build Docker (Vérifie que le Dockerfile est correct)
      - name: Build Docker Image
        run: docker build -t pronote-app:latest .

  dast_scan:
    runs-on: ubuntu-latest
    needs: quality-and-security
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Launch App for DAST
        run: |
          # On lance l'application en arrière-plan pour que ZAP puisse la scanner
          # Note: On désactive le HTTPS/Talisman pour le scan local si nécessaire
          docker build -t pronote-app:latest .
          docker run -d -p 5000:5000 --name scanner_app pronote-app:latest
          sleep 10 # On laisse 10 secondes à l'app pour démarrer

      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000' 
          fail_action: false 

      - name: Stop App
        run: docker stop scanner_app